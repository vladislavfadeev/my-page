<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Blog{% endblock %} — vfadeev.dev</title>
  <meta name="description" content="{% block meta_description %}Блог Vladislav Fadeev — заметки о Python, backend-разработке и технологиях.{% endblock %}">
  <link rel="stylesheet" href="{{ url_for('blog.static', filename='assets/css/blog.css') }}">
  {% block head %}{% endblock %}
</head>
<body>
  <div class="blog-wrapper">
    <header class="blog-header">
      <a href="{{ url_for('blog.index') }}" class="blog-logo">FV<span class="flsh">A</span></a>
      <nav class="blog-nav">
        <a href="{{ url_for('blog.index') }}">Blog</a>
        <a href="{{ url_for('public.index') }}">Home</a>
        {% if current_user.is_authenticated %}
          <span class="blog-user">
            {% if current_user.avatar_url %}
              <img src="{{ current_user.avatar_url }}" alt="" class="blog-user-avatar">
            {% endif %}
            {{ current_user.display_name }}
          </span>
          <a href="{{ url_for('auth.LoginView:logout') }}">Logout</a>
        {% else %}
          <a href="{{ url_for('auth.LoginView:get') }}?next={{ request.path }}">Login</a>
        {% endif %}
      </nav>
    </header>

    <main class="blog-main">
      {% block content %}{% endblock %}
    </main>

    <footer class="blog-footer">
      <p>&copy; vfadeev.dev</p>
    </footer>
  </div>
</body>
</html>
